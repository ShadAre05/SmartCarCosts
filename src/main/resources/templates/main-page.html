<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartCarCosts</title>
    <link rel="stylesheet" th:href="@{/css/main-page.css}">
</head>
<body>

<div class="main-page">
    <header class="main-header">
        <form th:action="@{/main-page}" method="get">
            <button type="submit" class="logo-btn">SmartCarCosts</button>
        </form>

        <form th:action="@{/login}" method="get">
            <button type="submit" class="get-started-btn">Get started</button>
        </form>
    </header>

    <main class="main-content">
        <section class="intro-block">
            <h1>Take control of your car expenses.</h1>

            <h2>Track. Analyze. Save.</h2>

            <p>
                <span>SmartCarCosts</span> helps you understand where<br>
                your money goes — and how to spend it<br>
                smarter.
            </p>
        </section>

        <section class="expenses-card">
            <h3>Expenses per month</h3>

            <div class="expense-row">
                <span>Fuel</span>
                <span>€67</span>
            </div>

            <div class="expense-row">
                <span>Insurance</span>
                <span>€31</span>
            </div>

            <div class="expense-row">
                <span>Service station</span>
                <span>€189</span>
            </div>

            <div class="expense-divider"></div>

            <div class="expense-row total-row">
                <span>Total</span>
                <span>€287</span>
            </div>
        </section>
    </main>

    <footer class="stats-block">
        <div class="stat-item">
            <strong>12000+</strong>
            <span>Active users</span>
        </div>

        <div class="stat-item">
            <strong>€ 3.2M</strong>
            <span>Expenses tracked</span>
        </div>

        <div class="stat-item">
            <strong>4.9 ★</strong>
            <span>Rating</span>
        </div>
    </footer>
</div>

</body>
</html>
