<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forget Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <a href="main.html" class="logo-box" style="text-decoration: none;">CarSmartCosts</a>
        <div class="form-card">
            <h2>Reset your password</h2>
            <p style="text-align: left; margin-bottom: 20px;">Enter the email address associated with your account and we'll send you a link to reset your password.</p>
            
            <form action="reset-check-email.html" method="GET">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="input-pink" name="email">
                </div>
                <button type="submit" class="btn btn-green">Continue</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="login.html" class="text-link">Return to Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
