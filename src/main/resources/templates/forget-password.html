<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forget Password</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="style.css">
</head>
<body>
    <div class="app-container">
        <a th:href="@{/main.html}" href="main.html" class="logo-box" style="text-decoration: none; display: inline-block; box-sizing: border-box;">CarSmartCosts</a>
        
        <div class="form-card">
            <h2>Reset your password</h2>
            <p style="text-align: left; margin-bottom: 20px;">Enter the email address associated with your account and we'll send you a link to reset your password.</p>
            
            <form th:action="@{/reset-check-email.html}" action="reset-check-email.html" method="GET">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="input-pink" name="email" placeholder="Enter your email...">
                </div>
                <button type="submit" class="btn btn-green">Continue</button>
            </form>
            
            <div class="text-center mt-3">
                <a th:href="@{/login.html}" href="login.html" class="text-link">Return to Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
