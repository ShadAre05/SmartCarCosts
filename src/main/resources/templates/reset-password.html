<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Enter New Password</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="style.css">
</head>
<body>
    <div class="app-container">
        <a th:href="@{/main.html}" href="main.html" class="logo-box" style="text-decoration: none;">CarSmartCosts</a>
        
        <div class="form-card">
            <h2>Reset your password</h2>
            
            <form th:action="@{/login.html}" action="login.html" method="POST">
                
                <div class="form-group" style="position: relative;">
                    <label>Enter your new password</label>
                    <input type="password" class="input-pink" name="new_password" id="newPass" placeholder="Enter new password...">
                    <span onclick="toggleBothPasswords()" style="position: absolute; right: 15px; top: 38px; cursor: pointer;">👁️</span>
                </div>
                
                <div class="form-group" style="position: relative;">
                    <label>Confirm your new password</label>
                    <input type="password" class="input-pink" name="confirm_password" id="confirmPass" placeholder="Confirm new password...">
                </div>
                
                <button type="submit" class="btn btn-green">Continue</button>
            </form>
            
            <script>
                function toggleBothPasswords() {
                    var newPass = document.getElementById("newPass");
                    var confirmPass = document.getElementById("confirmPass");
                    
                    if (newPass.type === "password") {
                        newPass.type = "text";
                        confirmPass.type = "text";
                    } else {
                        newPass.type = "password";
                        confirmPass.type = "password";
                    }
                }
            </script>
        </div>
    </div>
</body>
</html>
