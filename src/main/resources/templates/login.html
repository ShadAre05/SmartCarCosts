<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Smart Car Costs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <a href="main.html" class="logo-box" style="text-decoration: none;">CarSmartCosts</a>
        
        <div class="form-card">
            <h2>Sign in to your account</h2>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="input-pink" name="email">
                </div>
                
                <div class="form-group">
                    <label style="display: flex; justify-content: space-between;">
                        Password 
                        <a href="forget-password.html" class="text-link">Forget password?</a>
                    </label>
                    <input type="password" class="input-pink" name="password">
                </div>
                
                <button type="submit" class="btn btn-red">Sign in</button>
            </form>
            
            <div class="text-center mt-3">
                <p>New to SmartCarCosts? <a href="#" class="text-link">Create account</a></p>
                <p style="margin-top: 10px;">Want to create a <a href="#" class="text-link">service account</a>?</p>
            </div>
        </div>
    </div>
</body>
</html>
