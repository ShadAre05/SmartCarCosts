<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Smart Car Costs</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="style.css">
</head>
<body>
    <div class="app-container">
        <a th:href="@{/main.html}" href="main.html" class="logo-box" style="text-decoration: none; display: inline-block; box-sizing: border-box;">CarSmartCosts</a>
        
        <div class="form-card">
            <h2>Sign in to your account</h2>
            
            <form th:action="@{/login}" action="#" method="POST">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="input-pink" name="email" placeholder="Enter your email...">
                </div>
                
                <div class="form-group" style="position: relative;">
                    <label style="display: flex; justify-content: space-between;">
                        Password 
                        <a th:href="@{/forget-password.html}" href="forget-password.html" class="text-link">Forget password?</a>
                    </label>
                    <input type="password" class="input-pink" name="password" id="loginPassword" placeholder="Enter your password..." style="padding-right: 40px;">
                    <span onclick="togglePassword('loginPassword')" style="position: absolute; right: 15px; top: 38px; cursor: pointer;">👁️</span>
                </div>
                
                <button type="submit" class="btn btn-red">Sign in</button>
            </form>
            
            <div class="text-center mt-3">
                <p>New to SmartCarCosts? <a href="#" class="text-link">Create account</a></p>
                <p style="margin-top: 10px;">Want to create a <a href="#" class="text-link">service account</a>?</p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            var field = document.getElementById(fieldId);
            if (field.type === "password") {
                field.type = "text";
            } else {
                field.type = "password";
            }
        }
    </script>
</body>
</html>
