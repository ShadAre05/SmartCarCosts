<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login - Smart Car Costs</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div style="position: absolute; top: 40px; left: 40px;">
  <a th:href="@{/}" class="logo-box">SmartCarCosts</a>
</div>

<div class="login-card">
  <div style="text-align: center; margin-bottom: 30px;">
    <h2>Welcome!</h2>
    <p class="text-dim">Please enter your login details</p>
  </div>

  <form th:action="@{/login}" method="POST">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>

    <div class="form-group">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <label style="margin-bottom: 0;">Password</label>
        <a th:href="@{/forget-password}" class="text-link" style="font-size: 13px;">Forget password?</a>
      </div>
      <input type="password" name="password" required>
    </div>

    <button type="submit" class="btn btn-grey" style="margin-top: 15px;">Sign In</button>
  </form>

  <div style="text-align: center; margin-top: 30px; font-size: 14px; color: #cbd5e1;">
    <p style="margin-bottom: 10px;">Don't have an account? <a th:href="@{/register}" class="text-link">Sign Up</a></p>
    <p>Want to create a <a th:href="@{/service-register}" class="text-link">service account</a>?</p>
  </div>
</div>
</body>
</html>
