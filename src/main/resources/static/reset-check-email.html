<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Email</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <a href="main.html" class="logo-box" style="text-decoration: none;">CarSmartCosts</a>
        <div class="form-card">
            <h3 style="text-align: left; margin-bottom: 20px;">Check your email</h3>
            <p style="text-align: left; margin-bottom: 20px;">If *some_email* matches an email address we have on our database, we've sent you an email with a link to reset your password.</p>
            <p style="text-align: left; margin-bottom: 30px;">If you haven't received the email in 5 minutes, check your spam folder, resend, or try a different email address.</p>
            
            <div class="text-center">
                <a href="login.html" class="text-link">Return to Sign In</a>
            </div>
        </div>
    </div>
    <div class="text-center" style="margin-bottom: 20px;">
    <button id="resendBtn" class="btn btn-orange" disabled>Resend link (60s)</button>
</div>
    <script>
    let timeLeft = 60;
    const btn = document.getElementById('resendBtn');
    
    const timer = setInterval(() => {
        timeLeft--;
        btn.innerText = `Resend link (${timeLeft}s)`;
        
        if (timeLeft <= 0) {
            clearInterval(timer);
            btn.innerText = "Resend link";
            btn.disabled = false;
            btn.classList.replace('btn-orange', 'btn-green'); // Turns green when ready
        }
    }, 1000);
</script>
</body>
</html>
