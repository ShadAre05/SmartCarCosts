<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enter New Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="logo-box">CarSmartCosts</div>
        <div class="form-card">
            <h2>Reset your password</h2>
            
            <form action="login.html" method="POST">
                <div class="form-group">
                    <label>Enter your new password</label>
                    <input type="password" class="input-pink" name="new_password" value="**************">
                </div>
                <div class="form-group">
                    <label>Confirm your new password</label>
                    <input type="password" class="input-pink" name="confirm_password" value="**************">
                </div>
                
                <button type="submit" class="btn btn-green">Continue</button>
            </form>
        </div>
    </div>
</body>
</html>
