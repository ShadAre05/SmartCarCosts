<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enter New Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <a href="main.html" class="logo-box" style="text-decoration: none;">CarSmartCosts</a>
        <div class="form-card">
            <h2>Reset your password</h2>
            
            <form action="login.html" method="GET">
    <div class="form-group" style="position: relative;">
        <label>Enter your new password</label>
        <input type="password" class="input-pink" name="new_password" id="newPass" placeholder="Enter new password...">
        <span onclick="togglePassword('newPass')" style="position: absolute; right: 15px; top: 38px; cursor: pointer;">👁️</span>
    </div>
    
    <div class="form-group" style="position: relative;">
        <label>Confirm your new password</label>
        <input type="password" class="input-pink" name="confirm_password" id="confirmPass" placeholder="Confirm new password...">
        <span onclick="togglePassword('confirmPass')" style="position: absolute; right: 15px; top: 38px; cursor: pointer;">👁️</span>
    </div>
    
    <button type="submit" class="btn btn-green">Continue</button>
</form>
        </div>
    </div>
</body>
</html>
